name: tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile
        run: |
          python -m py_compile bot.py bot_base.py bot_exchange.py bot_execution.py bot_market.py bot_math.py bot_reporting.py bot_risk.py bot_scan.py bot_state.py bot_strategy.py backtest.py trade_stats.py

      - name: Run tests
        run: |
          pytest -q
